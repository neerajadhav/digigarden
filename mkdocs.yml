# Project information
site_name: DigiGarden
site_url: https://digigarden.neerajadhav.in
docs_dir: content
site_description: >-
  The digital garden of Adhav Neeraj Sahebrao – a space for evolving ideas, 
  technical notes, and personal reflections.

# Repository
repo_name: neerajadhav/digigarden
repo_url: https://github.com/neerajadhav/digigarden
edit_uri: https://github.com/neerajadhav/digigarden/edit/main/content/

# Copyright
copyright: "&copy; 2026 Adhav Neeraj Sahebrao"

# Configuration
theme:
  name: material
  custom_dir: overrides
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: lucide/sun-moon
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: lucide/sun
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: orange
      toggle:
        icon: lucide/moon-star
        name: Switch to system preference
  favicon: assets/logo.svg
  logo: assets/logo.svg
  icon:
    tag:
      default: lucide/hash

extra_css:
  - assets/stylesheets/extra.css

# Plugins
plugins:
  - search
  - tags

# Additional configuration
extra:
  homepage: https://neerajadhav.in
  scope: /
  annotate:
    json: [.s2]
  status:
    new: Recently added
    deprecated: Deprecated
  social:
    - icon: fontawesome/solid/envelope
      link: mailto:adhavneeraj9500@gmail.com
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/neerajadhav
    - icon: fontawesome/brands/github
      link: https://github.com/neerajadhav
    - icon: fontawesome/brands/instagram
      link: https://instagram.com/neerajadhav.in
    - icon: fontawesome/brands/mastodon
      link: https://sciences.social/@neerajadhav
    - icon: fontawesome/solid/globe
      link: https://neerajadhav.in
  tags:
    default: default

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - zensical.extensions.preview:
      targets:
        include:
          - "**/*.md"
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:zensical.extensions.emoji.to_svg
      emoji_index: !!python/name:zensical.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: neerajadhav
      repo: digigarden
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

